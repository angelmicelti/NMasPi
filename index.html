<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>N+π | Gestor de Planes IES Virgen de Valme</title>
    
    <!-- PWA primary meta tags -->
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="Plataforma docente para la gestión de planes de lectura y razonamiento matemático del I.E.S. Virgen de Valme." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NMasPi" />
    
    <!-- Manifest and Icon Links -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator && 
          !window.location.hostname.includes('localhost') && 
          !window.location.hostname.includes('127.0.0.1') && 
          !window.location.hostname.includes('run.app')) {
        window.addEventListener('load', () => {
          // Register with relative path to ensure compatibility across local host and subpaths like GitHub Pages
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registered scope:', registration.scope);
            })
            .catch((error) => {
              console.error('[PWA] Service Worker registration failed:', error);
            });
        });
      } else if ('serviceWorker' in navigator) {
        // If there was an active service worker in a previous dev session, unregister it to keep development fresh
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then((success) => {
              if (success) console.log('[PWA] Unregistered stale service worker for clean development.');
            });
          }
        });
      }
    </script>
  </body>
</html>
